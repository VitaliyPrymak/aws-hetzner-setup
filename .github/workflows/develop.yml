name: Develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: develop-${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform (hetzner/terraform)
    runs-on: ubuntu-latest # For self-hosted runner here should be its labels
    defaults:
      run:
        working-directory: hetzner/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - run: terraform fmt -check -recursive

      - run: terraform init -backend=false -input=false

      - run: terraform validate -no-color

  ansible:
    name: Ansible syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install --user ansible
          echo "$(python3 -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Syntax check
        working-directory: hetzner/ansible
        run: ansible-playbook --syntax-check site.yml
