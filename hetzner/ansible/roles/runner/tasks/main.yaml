---
- name: Stop if GitHub runner role disabled
  ansible.builtin.meta: end_host
  when: not (github_runner_enabled | bool)

- name: Ensure GitHub runner URL is provided
  ansible.builtin.assert:
    that:
      - github_runner_url | length > 0
    fail_msg: "Set github_runner_url in group_vars/host_vars."

- name: Install GitHub runner dependencies
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - tar
      - jq
      - git
      - unzip
      - libicu-dev
    state: present
    update_cache: true

- name: Install npm and yarn
  become: true
  shell: |
    apt update
    apt install -y npm
    npm install -g yarn
  args:
    executable: /bin/bash

- name: Ensure runner group exists
  ansible.builtin.group:
    name: "{{ github_runner_group }}"
    system: true
    state: present

- name: Ensure runner user exists
  ansible.builtin.user:
    name: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    shell: /bin/bash
    create_home: true
    system: true
    state: present

- name: Ensure runner directory exists
  ansible.builtin.file:
    path: "{{ github_runner_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    mode: "0755"

- name: Download GitHub Actions runner archive
  ansible.builtin.get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-{{ github_runner_platform }}-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz"
    dest: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    mode: "0644"

- name: Unarchive GitHub Actions runner
  ansible.builtin.unarchive:
    src: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    dest: "{{ github_runner_dir }}"
    remote_src: true
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    creates: "{{ github_runner_dir }}/config.sh"

- name: Ensure tools directory permissions
  ansible.builtin.file:
    path: "{{ github_runner_dir }}"
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_group }}"
    recurse: true

- name: Check if runner already configured
  ansible.builtin.stat:
    path: "{{ github_runner_dir }}/.runner"
  register: github_runner_configured

- name: Ensure auth is provided for new runner registration
  ansible.builtin.assert:
    that:
      - (github_runner_token | length > 0) or (github_runner_api_pat | length > 0)
    fail_msg: "Set github_runner_token OR github_runner_api_pat (recommended via ansible-vault)."
  when: not github_runner_configured.stat.exists

- name: Derive GitHub target from URL
  ansible.builtin.set_fact:
    github_runner_path_parts: "{{ (github_runner_url | regex_replace('^https://github\\.com/', '')).split('/') }}"
  when: not github_runner_configured.stat.exists

- name: Resolve GitHub registration token API endpoint
  ansible.builtin.set_fact:
    github_runner_registration_endpoint: >-
      {{
        github_runner_api_base ~ '/repos/' ~ github_runner_path_parts[0] ~ '/' ~ github_runner_path_parts[1] ~ '/actions/runners/registration-token'
        if (github_runner_path_parts | length == 2)
        else github_runner_api_base ~ '/orgs/' ~ github_runner_path_parts[0] ~ '/actions/runners/registration-token'
      }}
  when:
    - not github_runner_configured.stat.exists
    - github_runner_token | length == 0

- name: Validate GitHub URL for token generation
  ansible.builtin.assert:
    that:
      - github_runner_url is match('^https://github\\.com/[^/]+(/[^/]+)?$')
    fail_msg: "github_runner_url must be https://github.com/<org> or https://github.com/<owner>/<repo>."
  when:
    - not github_runner_configured.stat.exists
    - github_runner_token | length == 0

- name: Generate ephemeral runner token via GitHub API
  ansible.builtin.uri:
    url: "{{ github_runner_registration_endpoint }}"
    method: POST
    headers:
      Accept: "application/vnd.github+json"
      Authorization: "Bearer {{ github_runner_api_pat }}"
      X-GitHub-Api-Version: "2022-11-28"
    return_content: true
    status_code: 201
  register: github_runner_registration_response
  no_log: true
  when:
    - not github_runner_configured.stat.exists
    - github_runner_token | length == 0

- name: Pick effective runner token
  ansible.builtin.set_fact:
    github_runner_effective_token: >-
      {{
        github_runner_token
        if (github_runner_token | length > 0)
        else github_runner_registration_response.json.token
      }}
  no_log: true
  when: not github_runner_configured.stat.exists

- name: Build optional args for runner config
  ansible.builtin.set_fact:
    github_runner_labels_arg: "{{ '--labels ' + (github_runner_labels | join(',')) if (github_runner_labels | length > 0) else '' }}"
    github_runner_group_arg: "{{ '--runnergroup ' + github_runner_runnergroup if (github_runner_runnergroup | length > 0) else '' }}"

- name: Configure GitHub runner
  ansible.builtin.shell: >
    ./config.sh --unattended
    --url "{{ github_runner_url }}"
    --token "{{ github_runner_effective_token }}"
    --name "{{ github_runner_name }}"
    --work "{{ github_runner_workdir }}"
    --replace
    {{ github_runner_labels_arg }}
    {{ github_runner_group_arg }}
  args:
    chdir: "{{ github_runner_dir }}"
  become: true
  become_user: "{{ github_runner_user }}"
  no_log: true
  when: not github_runner_configured.stat.exists

- name: Install runner service
  ansible.builtin.command: "./svc.sh install {{ github_runner_user }}"
  args:
    chdir: "{{ github_runner_dir }}"
  when: not github_runner_configured.stat.exists

- name: Start runner service
  ansible.builtin.command: "./svc.sh start"
  args:
    chdir: "{{ github_runner_dir }}"
  when: not github_runner_configured.stat.exists

- name: Ensure runner service is enabled and running
  ansible.builtin.systemd:
    name: "actions.runner.{{ github_runner_url | regex_replace('^https://github.com/', '') | regex_replace('/', '.') }}.{{ github_runner_name }}.service"
    state: started
    enabled: true
  ignore_errors: true
