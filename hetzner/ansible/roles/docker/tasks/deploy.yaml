# tasks/deploy-docker-compose.yml
- name: Create docker-compose directory
  file:
    path: "{{ compose_project_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ compose_project_dir }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  notify: restart docker-compose

- name: Render environment files from templates
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  loop: "{{ docker_env_templates }}"
  notify: restart docker-compose

- name: Ensure docker network exists
  docker_network:
    name: "{{ compose_network_name }}"
    driver: bridge
    state: present

- name: Log into Docker Hub (private images)
  community.docker.docker_login:
    username: "{{ docker_registry_username }}"
    password: "{{ docker_registry_password }}"
  when:
    - docker_registry_username | default('') | length > 0
    - docker_registry_password | default('') | length > 0
    - docker_registry_url | default('') | length == 0
  no_log: true

- name: Log into custom container registry (private images)
  community.docker.docker_login:
    registry_url: "{{ docker_registry_url }}"
    username: "{{ docker_registry_username }}"
    password: "{{ docker_registry_password }}"
  when:
    - docker_registry_username | default('') | length > 0
    - docker_registry_password | default('') | length > 0
    - docker_registry_url | default('') | length > 0
  no_log: true

- name: Deploy docker-compose services
  community.docker.docker_compose_v2:
    project_src: "{{ compose_project_dir }}"
    state: present
    pull: always
    recreate: always
  register: compose_output

- name: Show compose output
  debug:
    var: compose_output
    verbosity: 1
